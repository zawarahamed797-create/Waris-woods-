<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waris Woods Works & Hardware Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3d2b1f; --accent: #d4a373; --bg: #fdfaf5; --success: #2ecc71; --steel: #4a4e69; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        /* Scrolling Ticker */
        .ticker-wrap { background: var(--accent); color: var(--primary); padding: 5px 0; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Header */
        header { background: var(--primary); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        
        .contact-top { font-size: 14px; font-weight: 600; background: var(--accent); color: var(--primary) !important; padding: 8px 18px; border-radius: 20px; text-decoration: none; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        /* Hero Banner - Updated with your file name */
        .hero { 
            background: url('warisbanner.jpg'); 
            height: 300px; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-bottom: 4px solid var(--accent);
        }
        /* ہیرو ٹیکسٹ کو ہٹا دیا گیا ہے کیونکہ وہ آپ کی تصویر کے اوپر پہلے سے لکھا ہے */
        .hero h1, .hero p { display: none; }

        /* Remaining Styles Stay Exactly Same */
        .transport-container { max-width: 1100px; margin: -30px auto 20px; padding: 0 20px; position: relative; z-index: 10; }
        .info-box { background: #fff; border-top: 4px solid var(--accent); padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .info-header { font-weight: 800; color: var(--primary); margin-bottom: 12px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .driver-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; }
        .driver-card { background: #fcf8f3; padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #efe5d9; }
        .btn-call { background: var(--primary); color: white; text-decoration: none; padding: 6px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-size: 24px; font-weight: 800; color: var(--primary); margin: 35px 0 25px; border-left: 6px solid var(--accent); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s; position: relative; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-title { font-size: 17px; font-weight: 700; color: var(--primary); margin: 0; }
        .card-price { color: var(--success); font-weight: 800; font-size: 20px; margin: 10px 0; }
        .btn-add { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        #cart-panel { position: fixed; right: -400px; top: 0; width: 380px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: 0.4s; z-index: 2000; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        #cart-panel.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; margin-top: 15px; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .summary-box { background: #fdfaf5; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; }
        .whatsapp-btn { background: #25D366; color: white; text-align: center; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; border: none; cursor: pointer; width: 100%; }
        .cart-btn-float { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1500; box-shadow: 0 8px 25px rgba(0,0,0,0.2); font-size: 22px; border: 2px solid var(--accent); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        @media (max-width: 500px) { #cart-panel { width: 100%; } .hero { height: 200px; } }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker">
        🔥 Special Offer: Get 10% Discount on Full Wood Fitting | 📞 Waris Wood Works: +92 313 0781469 | 📍 Phalia Road, Mandi Bahauddin
    </div>
</div>

<header>
    <a href="#" class="logo">WARIS <span>WOOD WORKS</span></a>
    <a href="tel:+923130781469" class="contact-top"><i class="fas fa-phone"></i> Call Now</a>
</header>

<div class="hero"></div>

<div class="transport-container">
    <div class="info-box">
        <div class="info-header"><i class="fas fa-shuttle-van"></i> Transport Partners</div>
        <div class="driver-grid">
            <div class="driver-card">
                <div class="driver-info"><b>Local Loader</b><br><span>Mandi Bahauddin</span></div>
                <a href="tel:03130781469" class="btn-call">Call</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="section-title">Special Bundle Deals</div>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1517646288021-2287f7a77545?q=80&w=400" alt="Hardware Kit">
            <div class="card-body">
                <h3 class="card-title">Door Fitting Hardware Kit</h3>
                <div class="card-price">Rs. 3,400</div>
                <button class="btn-add" onclick="addToCart('Door Fitting Kit', 3400)">Add Bundle</button>
            </div>
        </div>
    </div>
</div>
    
<div class="cart-btn-float" onclick="toggleCart()">
    <i class="fas fa-shopping-cart"></i>
    <div class="cart-count" id="count">0</div>
</div>

<div id="cart-panel">
    <div class="cart-header"><h2>Your Order</h2><button onclick="toggleCart()">×</button></div>
    <div class="cart-items-list" id="cart-list"></div>
    <div class="summary-box" id="summary-section" style="display:none;">
        <p>Total: Rs. <span id="total">0</span></p>
    </div>
    <button class="whatsapp-btn" onclick="sendWhatsApp()"><i class="fab fa-whatsapp"></i> Order on WhatsApp</button>
</div>

<script>
    let cart = [];
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    function addToCart(name, price) {
        let item = cart.find(i => i.name === name);
        item ? item.quantity++ : cart.push({name, price, quantity: 1});
        updateUI();
        if(!document.getElementById('cart-panel').classList.contains('active')) toggleCart();
    }
    function updateUI() {
        const list = document.getElementById('cart-list');
        const summary = document.getElementById('summary-section');
        list.innerHTML = ""; let total = 0; let itemsCount = 0;
        if(cart.length > 0) {
            summary.style.display = "block";
            cart.forEach((item) => {
                total += (item.price * item.quantity);
                itemsCount += item.quantity;
                list.innerHTML += `<div class="cart-item"><div><b>${item.name}</b></div><b>Rs.${(item.price * item.quantity).toLocaleString()}</b></div>`;
            });
        }
        document.getElementById('count').innerText = itemsCount;
        document.getElementById('total').innerText = total.toLocaleString();
    }
    function sendWhatsApp() {
        if(cart.length === 0) return alert("Empty Cart!");
        let text = "*WARIS WOOD WORKS - NEW ORDER*%0A";
        cart.forEach(item => text += `- ${item.name} (Qty: ${item.quantity})%0A`);
        window.open(`https://wa.me/923130781469?text=${text}`, '_blank');
    }
</script>
</body>
</html>
